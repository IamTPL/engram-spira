<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/logo-engram.png" />
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />
  <title>Engram Spira — Flashcards</title>
  <!-- Inter font: non-blocking load with display=swap -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!-- Use media trick to load font CSS asynchronously, avoiding render-blocking -->
  <link rel="preload" as="style"
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300..800;1,14..32,300..800&display=swap"
    onload="this.onload=null;this.rel='stylesheet'" />
  <noscript>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300..800;1,14..32,300..800&display=swap"
      rel="stylesheet" />
  </noscript>
</head>

<body>
  <a href="#main-content" style="
        position: absolute;
        left: -9999px;
        top: auto;
        width: 1px;
        height: 1px;
        overflow: hidden;
      " onfocus="
        this.style.cssText =
          'position:fixed;top:8px;left:8px;z-index:9999;padding:8px 16px;background:var(--color-background,#fff);color:var(--color-foreground,#000);border-radius:8px;border:1px solid;box-shadow:0 2px 8px rgba(0,0,0,.15);font-size:14px;font-weight:500;text-decoration:none'
      " onblur="
        this.style.cssText =
          'position:absolute;left:-9999px;top:auto;width:1px;height:1px;overflow:hidden'
      ">Skip to content</a>
  <div id="root">
    <!--
        Inline loading shell — rendered before ANY JS loads.
        Directly improves FCP: browser paints this immediately.
        Solid.js hydrates/replaces this when the app mounts.
      -->
    <div id="app-loading-shell" style="
        display:flex;
        flex-direction:column;
        align-items:center;
        justify-content:center;
        min-height:100svh;
        gap:16px;
        background:#f7fbff;
        font-family:system-ui,-apple-system,sans-serif;
      ">
      <img src="/logo-engram.png" alt="Engram Spira" width="40" height="40"
        style="opacity:0.6;animation:pulse 1.5s ease-in-out infinite" fetchpriority="high" />
      <div style="display:flex;align-items:center;gap:8px;color:#64748b;font-size:14px">
        <svg style="width:16px;height:16px;animation:spin 1s linear infinite" viewBox="0 0 24 24" fill="none">
          <circle style="opacity:.25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" />
          <path style="opacity:.75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z" />
        </svg>
        Loading...
      </div>
      <style>
        @keyframes spin {
          to {
            transform: rotate(360deg)
          }
        }

        @keyframes pulse {

          0%,
          100% {
            opacity: .6
          }

          50% {
            opacity: .3
          }
        }

        @media(prefers-color-scheme:dark) {
          #app-loading-shell {
            background: #0a0a0a;
            color: #94a3b8
          }
        }
      </style>
    </div>
  </div>
  <script type="module" src="/src/index.tsx"></script>
</body>

</html>
