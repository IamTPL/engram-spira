<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/webp" href="/logo-engram.webp" />
    <meta
      name="theme-color"
      content="#ffffff"
      media="(prefers-color-scheme: light)"
    />
    <meta
      name="theme-color"
      content="#0a0a0a"
      media="(prefers-color-scheme: dark)"
    />
    <title>Engram Spira — Flashcards</title>
    <!-- Inter font: non-blocking load with display=swap -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Use media trick to load font CSS asynchronously, avoiding render-blocking -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300..800;1,14..32,300..800&display=swap"
      onload="
        this.onload = null;
        this.rel = 'stylesheet';
      "
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300..800;1,14..32,300..800&display=swap"
        rel="stylesheet"
      />
    </noscript>
  </head>

  <body>
    <a
      href="#main-content"
      style="
        position: absolute;
        left: -9999px;
        top: auto;
        width: 1px;
        height: 1px;
        overflow: hidden;
      "
      onfocus="
        this.style.cssText =
          'position:fixed;top:8px;left:8px;z-index:9999;padding:8px 16px;background:var(--color-background,#fff);color:var(--color-foreground,#000);border-radius:8px;border:1px solid;box-shadow:0 2px 8px rgba(0,0,0,.15);font-size:14px;font-weight:500;text-decoration:none'
      "
      onblur="
        this.style.cssText =
          'position:absolute;left:-9999px;top:auto;width:1px;height:1px;overflow:hidden'
      "
      >Skip to content</a
    >
    <div id="root">
      <!--
        Inline loading shell — rendered before ANY JS loads.
        Directly improves FCP: browser paints this immediately.
        Solid.js hydrates/replaces this when the app mounts.
      -->
      <div
        id="app-loading-shell"
        style="
          display: flex;
          align-items: center;
          justify-content: center;
          min-height: 100svh;
          background: #f7fbff;
        "
      >
        <div
          style="
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 3px solid transparent;
            background:
              linear-gradient(#f7fbff, #f7fbff) padding-box,
              conic-gradient(
                  from 180deg,
                  #8eb0fb 0%,
                  #8dccf5 40%,
                  transparent 75%
                )
                border-box;
            animation: spin 0.8s linear infinite;
          "
        ></div>
        <style>
          @keyframes spin {
            to {
              transform: rotate(360deg);
            }
          }
          @media (prefers-color-scheme: dark) {
            #app-loading-shell {
              background: #0a0a0a;
            }
            #app-loading-shell > div {
              background:
                linear-gradient(#0a0a0a, #0a0a0a) padding-box,
                conic-gradient(
                    from 180deg,
                    #8eb0fb 0%,
                    #8dccf5 40%,
                    transparent 75%
                  )
                  border-box;
            }
          }
        </style>
      </div>
    </div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
