<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Engram Spira</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        width: 320px;
        font-family: system-ui, sans-serif;
        padding: 16px;
        background: #fff;
        color: #1a1a1a;
      }
      h1 {
        font-size: 16px;
        font-weight: 700;
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .logo {
        font-size: 20px;
      }
      .status {
        padding: 8px 12px;
        border-radius: 8px;
        font-size: 13px;
        margin-bottom: 12px;
      }
      .status.ok {
        background: #ecfdf5;
        color: #065f46;
      }
      .status.warn {
        background: #fef3c7;
        color: #92400e;
      }
      .status.error {
        background: #fef2f2;
        color: #991b1b;
      }
      label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        margin-bottom: 4px;
        color: #6b7280;
      }
      select,
      input {
        width: 100%;
        padding: 8px 10px;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        font-size: 13px;
        margin-bottom: 12px;
      }
      button {
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }
      .btn-primary {
        background: #3b82f6;
        color: #fff;
      }
      .btn-primary:hover {
        background: #2563eb;
      }
      .btn-primary:disabled {
        background: #93c5fd;
        cursor: not-allowed;
      }
      .btn-outline {
        background: transparent;
        border: 1px solid #d1d5db;
        color: #374151;
        margin-top: 8px;
      }
      .btn-outline:hover {
        background: #f3f4f6;
      }
      #login-section,
      #main-section {
        display: none;
      }
      .info {
        font-size: 11px;
        color: #9ca3af;
        margin-top: 8px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <h1><span class="logo">🧠</span> Engram Spira</h1>

    <!-- Login section -->
    <div id="login-section">
      <div class="status warn">
        Not logged in. Enter your API URL to connect.
      </div>
      <label for="api-url">API URL</label>
      <input
        id="api-url"
        type="url"
        value="http://localhost:3001"
        placeholder="http://localhost:3001"
      />
      <button class="btn-primary" id="btn-connect">Connect</button>
    </div>

    <!-- Main section (logged in) -->
    <div id="main-section">
      <div class="status ok" id="status-msg">Connected</div>
      <label for="deck-select">Target Deck</label>
      <select id="deck-select">
        <option value="">Loading decks...</option>
      </select>
      <button class="btn-primary" id="btn-create" disabled>
        Create Card from Selection
      </button>
      <button class="btn-outline" id="btn-logout">Disconnect</button>
      <p class="info">
        Highlight text on any page, then click "Create Card" or right-click →
        "Create Flashcard"
      </p>
    </div>

    <script src="dist/popup.js"></script>
  </body>
</html>
